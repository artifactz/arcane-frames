<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Frame From Arcane</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- This container MUST be position: relative -->
        <div class="slideshow-container">
            <!-- Two overlapping elements to handle the blend -->
            <img id="image-current" src="" alt="Current Slide Image" class="slide-image current">
            <img id="image-next" src="" alt="Next Slide Image" class="slide-image next">
        </div>
        <div class="taskbar-panel"></div>
    </div>

    <script src="filenames.js" ></script>
    <script src="script.js"></script>
</body>
</html>
